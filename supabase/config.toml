[auth]
enabled = true
site_url = "https://prefestbr.com.br"
enable_signup = true
additional_redirect_urls = ["https://prefestbr.com.br/auth/error", "https://prefestbr.com.br/", "https://prefestbr.com.br/reset-password", "https://*.com.br"]

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[functions.debug-auth]
enabled = false
verify_jwt = true
import_map = "./functions/debug-auth/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/debug-auth/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/debug-auth/*.html" ]

# --- CRITICAL FUNCTIONS (MANUAL AUTH VALIDATION) ---
# Disable built-in verify_jwt to prevent "Invalid JWT" errors from the Gateway.
# These functions MUST use requireAuth() internally.

[functions.asaas-create-ticket-payment-v3]
